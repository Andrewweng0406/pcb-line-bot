<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PCB 報價系統{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/static/style.css">
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="min-h-screen">
    {% if user %}
    <nav class="bg-white border-b-2 px-4 sm:px-6 py-3" style="border-color: var(--copper)" x-data="{ open: false }">
        <div class="flex items-center gap-4">
            <a href="/" class="whitespace-nowrap" style="color: var(--copper-dark); font-weight: 700;">PCB 報價系統</a>
            <div class="hidden md:flex items-center gap-6 flex-1">
                <a href="/quotes/new" class="text-sm link-circuit whitespace-nowrap" style="color: var(--ink-muted)">新增報價</a>
                <a href="/quotes" class="text-sm whitespace-nowrap" style="color: var(--ink-muted)">報價列表</a>
                <a href="/customers" class="text-sm whitespace-nowrap" style="color: var(--ink-muted)">客戶管理</a>
                <a href="/stats" class="text-sm whitespace-nowrap" style="color: var(--ink-muted)">統計報告</a>
                <span class="ml-auto text-sm font-data whitespace-nowrap" style="color: var(--ink-muted)">{{ user.email }}</span>
                <a href="/logout" class="text-sm whitespace-nowrap" style="color: var(--copper)">登出</a>
            </div>
            <button
                type="button"
                @click="open = !open"
                class="md:hidden ml-auto btn-secondary px-3 py-1.5 text-sm"
            >
                選單
            </button>
        </div>
        <div x-show="open" x-cloak class="md:hidden flex flex-col gap-3 mt-3 pb-1">
            <a href="/quotes/new" class="text-sm" style="color: var(--ink-muted)">新增報價</a>
            <a href="/quotes" class="text-sm" style="color: var(--ink-muted)">報價列表</a>
            <a href="/customers" class="text-sm" style="color: var(--ink-muted)">客戶管理</a>
            <a href="/stats" class="text-sm" style="color: var(--ink-muted)">統計報告</a>
            <span class="text-sm font-data pt-3" style="color: var(--ink-muted); border-top: 1px solid var(--border)">{{ user.email }}</span>
            <a href="/logout" class="text-sm" style="color: var(--copper)">登出</a>
        </div>
    </nav>
    {% endif %}
    <main class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
