{% extends "base.html" %}
{% block title %}新增報價 - PCB 報價系統{% endblock %}
{% block content %}
<h1 class="text-2xl mb-6">新增報價</h1>

{% if error %}
<p class="text-sm mb-4" style="color: var(--copper-dark)">{{ error }}</p>
{% endif %}

<div class="card p-6 mb-6" style="border-top-color: var(--gold)">
    <h2 class="font-medium mb-3" style="color: var(--gold)">AI 輔助填單</h2>
    <div class="flex flex-col sm:flex-row gap-3 sm:items-end">
        <div class="flex-1">
            <label class="block text-sm mb-1 whitespace-nowrap" style="color: var(--ink-muted)">貼上規格文字</label>
            <textarea
                id="ai-spec-text"
                name="spec_text"
                rows="2"
                class="w-full border rounded-lg px-3 py-2"
                style="border-color: var(--border)"
                placeholder="例如：6層 FR4 100x100mm 數量9 ENIG 10u"
            ></textarea>
        </div>
        <div>
            <label class="block text-sm mb-1 whitespace-nowrap" style="color: var(--ink-muted)">或上傳 PCB 圖片</label>
            <input type="file" id="ai-photo" name="photo" accept="image/*" class="text-sm w-full">
        </div>
        <button
            type="button"
            hx-post="/quotes/new/ai-assist"
            hx-include="#ai-spec-text, #ai-photo"
            hx-encoding="multipart/form-data"
            hx-target="#quote-form-fields"
            hx-swap="innerHTML"
            class="px-4 py-2 text-sm font-medium whitespace-nowrap rounded-lg"
            style="background: var(--gold); color: #FFFFFF"
        >
            AI 解析並帶入表單
        </button>
    </div>
</div>

<form method="post" action="/quotes/new" class="card p-6">
    <div id="quote-form-fields">
        {% include "_quote_form_fields.html" %}
    </div>
    <button type="submit" class="mt-6 btn-primary px-6 py-2">
        計算並儲存報價
    </button>
</form>
{% endblock %}
